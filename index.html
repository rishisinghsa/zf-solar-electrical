<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z&F Solar & Electrical | Solar & Electrical Solutions</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        
        :root {
            --volt-dark: #0B0E11;   
            --volt-blue: #007BFF;   
            --volt-cyan: #00D4FF;   
            --volt-white: #F8F9FA;  
        }

        html, body { 
            height: auto !important; 
            overflow-y: auto !important; 
            overflow-x: hidden;
            background-color: var(--volt-dark);
            color: var(--volt-white);
            font-family: 'Inter', sans-serif;
            margin: 0;
            scroll-behavior: smooth;
        }

        .glass { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
        }

        /* Gallery Hover Effect */
        .gallery-item { overflow: hidden; position: relative; border-radius: 1.5rem; }
        .gallery-item img { transition: transform 0.5s ease; width: 100%; height: 100%; object-fit: cover; }
        .gallery-item:hover img { transform: scale(1.1); }
        .gallery-overlay { 
            position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,212,255,0.4), transparent); 
            opacity: 0; transition: opacity 0.3s; display: flex; align-items: flex-end; padding: 20px;
        }
        .gallery-item:hover .gallery-overlay { opacity: 1; }

        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 8px; background: #333; border-radius: 4px; }
        input[type=range]::-webkit-slider-thumb { height: 24px; width: 24px; border-radius: 50%; background: var(--volt-cyan); -webkit-appearance: none; margin-top: -8px; cursor: pointer; box-shadow: 0 0 10px var(--volt-cyan); }

        #wa-widget { position: fixed; bottom: 25px; right: 25px; z-index: 9999; }
        .wa-main { width: 60px; height: 60px; background: #25d366; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; color: white; box-shadow: 0 5px 15px rgba(0,0,0,0.4); cursor: pointer; }
    </style>
</head>

                <a href="#calculator" class="hover:text-[var(--volt-cyan)]">Sizing</a>

    </nav>
