<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z&F Solar & Electrical | Master Power Solutions | JHB & PTA</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        
        :root {
            /* Theme: Volt & Carbon */
            --volt-dark: #0B0E11;   
            --volt-blue: #007BFF;   
            --volt-slate: #6C757D;  
            --volt-cyan: #00D4FF;   
            --volt-white: #F8F9FA;  
        }

        body { 
            font-family: 'Inter', sans-serif; 
            scroll-behavior: smooth; 
            background-color: var(--volt-dark); 
            color: var(--volt-white); 
            margin: 0;
            /* Technical Watermark Integration */
            background-image: linear-gradient(rgba(11, 14, 17, 0.92), rgba(11, 14, 17, 0.92)), 
                              url('https://www.transparenttextures.com/patterns/carbon-fibre.png'),
                              url('https://img.icons8.com/ios-filled/500/007BFF/solar-panel.png');
            background-repeat: repeat, repeat, no-repeat;
            background-position: center, center, center 20%;
            background-attachment: fixed;
            background-size: auto, auto, 60% auto;
        }

        .glass { background: rgba(248, 249, 250, 0.02); backdrop-filter: blur(15px); border: 1px solid rgba(248, 249, 250, 0.05); }
        
        /* Custom Range Slider */
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 8px; cursor: pointer; background: var(--volt-slate); border-radius: 4px; }
        input[type=range]::-webkit-slider-thumb { height: 24px; width: 24px; border-radius: 50%; background: var(--volt-blue); cursor: pointer; -webkit-appearance: none; margin-top: -8px; box-shadow: 0 0 15px rgba(0, 123, 255, 0.5); border: 2px solid var(--volt-white); }

        /* WhatsApp Floating Widget */
        #wa-container { position: fixed !important; bottom: 30px !important; right: 30px !important; z-index: 9999999 !important; display: flex !important; flex-direction: column !important; align-items: flex-end !important; }
        .wa-main-btn { width: 65px; height: 65px; background: #25d366; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 35px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); cursor: pointer; animation: pulse-green 2s infinite; }
        .wa-menu { margin-bottom: 15px; display: none; flex-direction: column; gap: 10px; width: 230px; }
        .wa-contact { background: var(--volt-blue); padding: 14px 20px; border-radius: 15px; color: white; font-weight: 600; text-decoration: none; border: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; gap: 12px; transition: 0.3s; }
        .wa-contact:hover { background: var(--volt-white); color: var(--volt-dark); transform: translateX(-5px); }
        #wa-container:hover .wa-menu { display: flex !important; }
        
        @keyframes pulse-green { 0% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.7); } 70% { box-shadow: 0 0 0 20px rgba(37, 211, 102, 0); } 100% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0); } }
    </style>
</head>
<body>

    <nav class="fixed w-full z-50 glass py-4">
        <div class="container mx-auto px-6 flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <div class="w-10 h-10 bg-[var(--volt-blue)] rounded flex items-center justify-center text-white font-black text-xl">ZF</div>
                <span class="text-xl font-extrabold tracking-tighter uppercase">Solar <span class="text-[var(--volt-cyan)]">&</span> Electrical</span>
            </div>
            <div class="hidden lg:flex space-x-8 text-xs font-bold uppercase tracking-widest">
                <a href="#services" class="hover:text-[var(--volt-cyan)] transition">Services</a>
                <a href="#calculator" class="hover:text-[var(--volt-cyan)] transition">Sizing Guide</a>
                <a href="#esp" class="hover:text-[var(--volt-cyan)] transition">ESP Live</a>
                <a href="#contact" class="bg-[var(--volt-blue)] text-white px-5 py-2 rounded-md font-bold hover:bg-[var(--volt-cyan)] hover:text-[var(--volt-dark)] transition shadow-lg">Contact</a>
            </div>
        </div>
    </nav>

    <section class="relative h-screen flex items-center justify-center text-center px-6">
        <div class="absolute inset-0 z-0 opacity-10 bg-gradient-to-b from-[var(--volt-blue)]/40 to-transparent"></div>
        <div class="container mx-auto relative z-10">
            <div class="inline-block px-4 py-1 mb-6 border border-[var(--volt-cyan)] rounded-full text-[10px] font-bold uppercase tracking-[0.3em] text-[var(--volt-cyan)] bg-[var(--volt-blue)]/10">
                Certified PV Installers & Wiremen
            </div>
            <h1 class="text-6xl md:text-8xl font-black mb-6 uppercase tracking-tighter italic leading-none">
                <span class="text-[var(--volt-cyan)]">VOLT</span> REFINED.<br>POWERED
